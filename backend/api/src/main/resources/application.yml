# ========================================
# EQUIPHUB API - APPLICATION CONFIGURATION
# Environment: Development
# ========================================

spring:
  application:
    name: equiphub-api
  
  # ========== PROFILES ==========
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # ========== DATABASE CONFIGURATION ==========
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/equiphub_dev}
    username: ${DATABASE_USERNAME:equiphub_user}
    password: ${DATABASE_PASSWORD:equiphub_password}
    driver-class-name: org.postgresql.Driver
    
    # Connection Pool (HikariCP)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: EQuipHubHikariCP
  
  # ========== JPA / HIBERNATE ==========
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # ========== REDIS CACHE ==========
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
  
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes
  
  # ========== EMAIL CONFIGURATION (GMAIL SMTP) ==========
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-specific-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  
  # ========== FILE UPLOAD ==========
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  # ========== JACKSON JSON ==========
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Colombo

# ========== SERVER CONFIGURATION ==========
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# ========== JWT CONFIGURATION ==========
jwt:
  secret: ${JWT_SECRET:YourSuperSecretJWTKeyMinimum256BitsForHS256AlgorithmProductionReadyEquipHubSecurityToken2026}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000} # 15 minutes
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
  issuer: equiphub-api

# ========== CORS CONFIGURATION ==========
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# ========== LOGGING ==========
logging:
  level:
    root: INFO
    com.equiphub: ${LOG_LEVEL:DEBUG}
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/equiphub-api.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# ========== ACTUATOR (HEALTH CHECKS) ==========
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ========== SPRINGDOC / SWAGGER ==========
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false

# ========== APPLICATION-SPECIFIC ==========
app:
  name: EQuipHub
  version: 1.0.0
  description: Equipment Request Management System
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  
  # Email Templates
  email:
    from-address: ${EMAIL_FROM:noreply@equiphub.university.edu}
    from-name: EQuipHub System
  
  # SIS API Configuration
  sis:
    api-url: ${SIS_API_URL:https://sis.university.edu/api}
    api-key: ${SIS_API_KEY:your-sis-api-key}
    timeout: 30000
