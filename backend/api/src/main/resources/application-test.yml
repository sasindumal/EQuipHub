# ==================== TEST PROFILE CONFIGURATION ====================
# File: application-test.yml
# Location: backend/api/src/main/resources/application-test.yml
# Profile: test (integration tests, CI/CD)
# Active when: SPRING_PROFILES_ACTIVE=test

# This file OVERRIDES settings from application.yml for testing
# Key feature: Uses H2 in-memory database (no Docker needed!)

spring:
  # ==================== TEST DATABASE CONFIGURATION ====================
  # H2 In-Memory Database
  # Advantages:
  # - No Docker containers needed
  # - Extremely fast (RAM-based)
  # - Automatic creation/destruction per test
  # - Perfect for unit and integration tests
  
  datasource:
    # H2 in-memory database
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      auto-commit: true

  # ==================== H2 CONSOLE (Optional) ====================
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  # ==================== JPA/HIBERNATE ====================
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Create schema before each test, drop after
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false
        jdbc:
          batch_size: 0  # Disable batching for test consistency
          fetch_size: 50

  # ==================== FLYWAY DISABLED FOR TESTS ====================
  # Flyway is disabled - Hibernate will create/drop schema
  flyway:
    enabled: false

  # ==================== REDIS CONFIGURATION ====================
  # Disable Redis for tests - use in-memory cache instead
  data:
    redis:
      url: redis://invalid-test-host:6379  # Invalid URL to force fallback
  
  cache:
    type: simple  # Use simple in-memory cache for tests
    cache-names: default

  # ==================== LOGGING CONFIGURATION ====================
  # Minimal logging for test clarity
  logging:
    level:
      root: WARN
      com.equiphub: INFO
      org.springframework.test: INFO
      org.springframework.test.context: INFO
      org.springframework: WARN
      org.hibernate: WARN
      org.h2.server: WARN
    pattern:
      console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

  # ==================== SECURITY ====================
  security:
    jwt:
      secret: test-secret-key-minimum-256-bits-for-testing-purposes-only-12345
      expiration: 3600000
      refresh-expiration: 86400000

  # ==================== MAIL CONFIGURATION ====================
  # Disable email sending in tests
  mail:
    host: localhost
    port: 1025  # MailHog or mock server (not used in tests)
    username: test
    password: test

  # ==================== ERROR HANDLING ====================
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param  # Only show on request
    include-exception: false

# ==================== SERVER CONFIGURATION ====================
server:
  port: 8080
  servlet:
    context-path: /api

# ==================== ACTUATOR CONFIGURATION ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ==================== SPRINGDOC SWAGGER (DISABLED) ====================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
  show-actuator: false

# ==================== TEST-SPECIFIC CONFIGURATION ====================
app:
  test:
    enabled: true
    # Use test data
    auto-populate-test-data: true
    mock-email: true
    verbose-logging: false
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
    max-age: 3600
