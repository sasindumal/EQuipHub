version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: equiphub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: equiphub_dev
      POSTGRES_USER: equiphub_user
      POSTGRES_PASSWORD: equiphub_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equiphub_user -d equiphub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equiphub-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: equiphub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass equiphub_redis_pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equiphub-network

  # Backend API
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: equiphub-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/equiphub_dev
      DATABASE_USERNAME: equiphub_user
      DATABASE_PASSWORD: equiphub_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: equiphub_redis_pass
      JWT_SECRET: ${JWT_SECRET:-YourSuperSecretJWTKeyMinimum256BitsForHS256}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - equiphub-network

  # PgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: equiphub-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@equiphub.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - equiphub-network

networks:
  equiphub-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
